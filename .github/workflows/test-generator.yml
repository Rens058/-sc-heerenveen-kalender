name: Test Abe Agenda generator

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python update_calendar.py

      - name: Show generated files
        run: |
          ls -la
          head -40 heerenveen.ics
