name: Update Abe Agenda

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run generator
        run: python update_calendar.py

      - name: Commit updated calendar
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Abe Agenda calendar"
          file_pattern: heerenveen.ics
